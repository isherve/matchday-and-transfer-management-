<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Team Dashboard')}"></head>
<body class="app-body">
<aside th:replace="~{fragments/layout :: team-sidebar('home')}"></aside>
<header th:replace="~{fragments/layout :: team-topbar}"></header>
<main class="app-main">
    <div class="d-flex align-items-center gap-3 mb-4">
        <img class="team-crest" th:src="${team.logo != null ? team.logo : '/img/ferwafa-logo.png'}" th:alt="${team.name}">
        <div>
            <h2 class="mb-0" th:text="${team.name}">Team</h2>
            <div class="text-muted" th:text="${team.stadium}">Stadium</div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-8">
            <div class="panel">
                <div class="panel-header">Fixtures by week</div>
                <div class="panel-body">
                    <div class="fixture-row" th:each="f : ${fixtures}">
                        <span class="badge text-bg-light">Week <span th:text="${f.week}"></span></span>
                        <img class="team-crest sm" th:src="${f.homeTeamLogo != null ? f.homeTeamLogo : '/img/ferwafa-logo.png'}" alt="">
                        <span th:text="${f.homeTeamName}"></span>
                        <span class="text-muted">vs</span>
                        <span th:text="${f.awayTeamName}"></span>
                        <img class="team-crest sm" th:src="${f.awayTeamLogo != null ? f.awayTeamLogo : '/img/ferwafa-logo.png'}" alt="">
                        <span class="badge bg-secondary ms-auto" th:text="${f.status}"></span>
                    </div>
                    <div th:if="${fixtures.isEmpty()}" class="p-4 text-muted text-center">No fixtures</div>
                </div>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="panel">
                <div class="panel-header">Squad (<span th:text="${members.size()}"></span>)</div>
                <div class="p-3">
                    <p class="small text-muted">Players and staff registered for this club.</p>
                    <a href="/team/members" class="btn btn-outline-primary btn-sm me-2">Members</a>
                    <a href="/team/lineup" class="btn btn-primary btn-sm">Set Lineup</a>
                </div>
            </div>
        </div>
    </div>
</main>
<script th:replace="~{fragments/layout :: scripts}"></script>
<script th:inline="javascript">
    document.getElementById('teamTopName').textContent = /*[[${team.name}]]*/ 'Team';
    const logo = /*[[${team.logo}]]*/ null;
    if (logo) document.getElementById('teamTopLogo').src = logo;
</script>
</body>
</html>
