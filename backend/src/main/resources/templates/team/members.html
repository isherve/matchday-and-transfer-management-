<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Squad')}"></head>
<body>
<nav th:replace="~{fragments/layout :: team-nav}"></nav>
<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 th:text="${team.name} + ' — Squad'">Squad</h2>
        <a href="/team/members/new" class="btn btn-primary">Register Member</a>
    </div>
    <div class="card table-responsive">
        <table class="table table-striped mb-0">
            <thead>
            <tr><th>#</th><th>Name</th><th>Role</th><th>Position</th><th>Post</th><th></th></tr>
            </thead>
            <tbody>
            <tr th:each="m : ${members}">
                <td th:text="${m.number}"></td>
                <td th:text="${m.fname + ' ' + m.lname}"></td>
                <td th:text="${m.roleInTeam}"></td>
                <td th:text="${m.position}"></td>
                <td th:text="${m.post}"></td>
                <td>
                    <button class="btn btn-sm btn-outline-danger"
                            th:onclick="'deleteMember(' + ${m.memberId} + ')'">Delete</button>
                </td>
            </tr>
            <tr th:if="${members.isEmpty()}">
                <td colspan="6" class="text-center text-muted py-4">No members yet</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<script th:replace="~{fragments/layout :: scripts}"></script>
<script>
async function deleteMember(id) {
    if (!confirm('Delete this member?')) return;
    try {
        const token = getToken();
        const res = await fetch('/api/members/' + id, {
            method: 'DELETE',
            headers: token ? { Authorization: 'Bearer ' + token } : {},
            credentials: 'include'
        });
        if (!res.ok) {
            const data = await res.json().catch(() => ({}));
            throw new Error(data.message || 'Delete failed');
        }
        showToast('Member deleted');
        setTimeout(() => location.reload(), 600);
    } catch (e) { showToast(e.message, 'danger'); }
}
</script>
</body>
</html>
