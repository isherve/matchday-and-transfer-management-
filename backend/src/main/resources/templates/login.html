<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FERWAFA - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="login-page">
<div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-md-5">
            <div class="card shadow-lg border-0">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <h2 class="text-success fw-bold">FERWAFA</h2>
                        <p class="text-muted">Match Day & Transfer Management</p>
                    </div>
                    <ul class="nav nav-pills nav-fill mb-4" role="tablist">
                        <li class="nav-item"><a class="nav-link active" data-bs-toggle="pill" href="#admin-login">Admin</a></li>
                        <li class="nav-item"><a class="nav-link" data-bs-toggle="pill" href="#team-login">Team Manager</a></li>
                    </ul>
                    <div class="tab-content">
                        <div class="tab-pane fade show active" id="admin-login">
                            <form id="adminLoginForm">
                                <div class="mb-3">
                                    <label class="form-label">Username</label>
                                    <input type="text" class="form-control" id="adminUsername" value="admin" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Password</label>
                                    <input type="password" class="form-control" id="adminPassword" value="password" required>
                                </div>
                                <div id="adminError" class="alert alert-danger d-none"></div>
                                <button type="submit" class="btn btn-success w-100">Login as Admin</button>
                            </form>
                        </div>
                        <div class="tab-pane fade" id="team-login">
                            <form id="teamLoginForm">
                                <div class="mb-3">
                                    <label class="form-label">Team Username</label>
                                    <input type="text" class="form-control" id="teamUsername" placeholder="e.g. apr" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Password</label>
                                    <input type="password" class="form-control" id="teamPassword" value="password" required>
                                </div>
                                <div id="teamError" class="alert alert-danger d-none"></div>
                                <button type="submit" class="btn btn-primary w-100">Login as Team</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/api.js}"></script>
<script th:src="@{/js/auth.js}"></script>
</body>
</html>
