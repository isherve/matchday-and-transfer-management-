<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FERWAFA Premier League — Standings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/public/standings">FERWAFA Premier League</a>
        <div>
            <a class="btn btn-outline-light btn-sm me-2" href="/login">Login</a>
        </div>
    </div>
</nav>
<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>League Table <small class="text-muted" th:text="${season}"></small></h2>
        <a class="btn btn-outline-success btn-sm" href="/api/reports/standings/pdf" target="_blank">Download PDF</a>
    </div>

    <div class="card mb-4">
        <div class="table-responsive">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-success">
                <tr>
                    <th>#</th><th>Club</th><th>P</th><th>W</th><th>D</th><th>L</th>
                    <th>GF</th><th>GA</th><th>GD</th><th>Pts</th><th>Ded</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="row : ${standings}">
                    <td th:text="${row.position}"></td>
                    <td class="fw-semibold" th:text="${row.teamName}"></td>
                    <td th:text="${row.played}"></td>
                    <td th:text="${row.won}"></td>
                    <td th:text="${row.drawn}"></td>
                    <td th:text="${row.lost}"></td>
                    <td th:text="${row.goalsFor}"></td>
                    <td th:text="${row.goalsAgainst}"></td>
                    <td th:text="${row.goalDifference}"></td>
                    <td class="fw-bold" th:text="${row.points}"></td>
                    <td>
                        <span th:if="${row.pointsDeducted > 0}" class="badge bg-danger" th:text="${'-' + row.pointsDeducted}"></span>
                        <span th:unless="${row.pointsDeducted > 0}">—</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-6">
            <div class="card">
                <div class="card-header">Top Scorers</div>
                <ul class="list-group list-group-flush">
                    <li class="list-group-item d-flex justify-content-between"
                        th:each="s, iter : ${topScorers}">
                        <span>
                            <span class="badge bg-success me-2" th:text="${iter.count}"></span>
                            <span th:text="${s.playerName}"></span>
                            <small class="text-muted" th:text="${'(' + s.teamName + ')'}"></small>
                        </span>
                        <strong th:text="${s.goals}"></strong>
                    </li>
                    <li class="list-group-item text-muted" th:if="${topScorers.isEmpty()}">No scorers yet</li>
                </ul>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="card">
                <div class="card-header">Cards Leaderboard</div>
                <ul class="list-group list-group-flush">
                    <li class="list-group-item d-flex justify-content-between"
                        th:each="c : ${cards}">
                        <span th:text="${c.playerName + ' (' + c.teamName + ')'}"></span>
                        <span>
                            <span class="badge bg-warning text-dark me-1" th:text="${c.yellowCards + 'Y'}"></span>
                            <span class="badge bg-danger" th:text="${c.redCards + 'R'}"></span>
                        </span>
                    </li>
                    <li class="list-group-item text-muted" th:if="${cards.isEmpty()}">No cards recorded</li>
                </ul>
            </div>
        </div>
    </div>

    <div class="card mt-4">
        <div class="card-header">Fixtures & Results</div>
        <div class="table-responsive">
            <table class="table mb-0">
                <thead><tr><th>Week</th><th>Match</th><th>Score</th><th>Date</th><th>Status</th></tr></thead>
                <tbody>
                <tr th:each="f : ${fixtures}">
                    <td th:text="${f.week}"></td>
                    <td th:text="${f.homeTeamName + ' vs ' + f.awayTeamName}"></td>
                    <td>
                        <span th:if="${f.homeScore != null}" th:text="${f.homeScore + ' - ' + f.awayScore}"></span>
                        <span th:unless="${f.homeScore != null}" class="text-muted">—</span>
                    </td>
                    <td th:text="${f.matchDate}"></td>
                    <td><span class="badge bg-secondary" th:text="${f.status}"></span></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
