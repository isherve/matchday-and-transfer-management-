<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Transfers')}"></head>
<body class="app-body">
<aside th:replace="~{fragments/layout :: admin-sidebar('transfers')}"></aside>
<header th:replace="~{fragments/layout :: admin-topbar}"></header>
<main class="app-main">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <div>
            <h2 class="mb-1">Transfer Management</h2>
            <p class="text-muted mb-0">Approve, reject, or complete transfer requests between clubs.</p>
        </div>
        <a class="btn btn-outline-primary btn-sm" href="/admin/reports/transfers" target="_blank">Transfers report / PDF</a>
    </div>

    <div class="panel">
        <div class="panel-header">All transfer requests</div>
        <div class="table-responsive">
            <table class="table mb-0 align-middle">
                <thead>
                <tr>
                    <th>Player</th>
                    <th>From</th>
                    <th>To</th>
                    <th>Post</th>
                    <th>Requested</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="tr : ${transfers}">
                    <td class="fw-semibold" th:text="${tr.memberName}"></td>
                    <td th:text="${tr.teamFromName}"></td>
                    <td th:text="${tr.teamToName}"></td>
                    <td th:text="${tr.post != null ? tr.post : '—'}"></td>
                    <td th:text="${tr.requestDate}"></td>
                    <td><span class="badge bg-secondary" th:text="${tr.status}"></span></td>
                    <td class="text-nowrap">
                        <button th:if="${tr.status.name() == 'REQUESTED'}"
                                class="btn btn-sm btn-success me-1"
                                th:onclick="'actTransfer(' + ${tr.id} + ', \'approve\')'">Approve</button>
                        <button th:if="${tr.status.name() == 'REQUESTED'}"
                                class="btn btn-sm btn-outline-danger me-1"
                                th:onclick="'actTransfer(' + ${tr.id} + ', \'reject\')'">Reject</button>
                        <button th:if="${tr.status.name() == 'APPROVED'}"
                                class="btn btn-sm btn-ferwafa"
                                th:onclick="'actTransfer(' + ${tr.id} + ', \'complete\')'">Complete</button>
                        <span th:if="${tr.status.name() == 'COMPLETED' or tr.status.name() == 'REJECTED'}"
                              class="text-muted small">No actions</span>
                    </td>
                </tr>
                <tr th:if="${transfers.isEmpty()}">
                    <td colspan="7" class="text-center text-muted py-4">No transfers</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
<script th:replace="~{fragments/layout :: scripts}"></script>
<script>
async function actTransfer(id, action) {
    if (!confirm(action.charAt(0).toUpperCase() + action.slice(1) + ' this transfer?')) return;
    try {
        await apiCall('PUT', `/api/transfers/${id}/${action}`);
        showToast('Transfer ' + action + 'd');
        setTimeout(() => location.reload(), 600);
    } catch (e) { showToast(e.message, 'danger'); }
}
</script>
</body>
</html>
