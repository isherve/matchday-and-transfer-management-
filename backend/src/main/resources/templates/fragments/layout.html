<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">FERWAFA</title>
    <link rel="icon" th:href="@{/img/ferwafa-logo.png}" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<!-- Admin sidebar: pass active section key via th:with or replace param -->
<aside th:fragment="admin-sidebar(active)" class="app-sidebar">
    <a class="sidebar-brand brand-lockup" href="/admin/dashboard">
        <img th:src="@{/img/ferwafa-logo.png}" alt="FERWAFA">
        <span>
            <span class="brand-name">FERWAFA</span>
            <span class="brand-sub">Match Day Admin</span>
        </span>
    </a>
    <nav class="nav flex-column">
        <a class="nav-link" th:classappend="${active == 'home'} ? ' active'" href="/admin/dashboard">
            <i class="bi bi-house nav-icon"></i> Home
        </a>
        <a class="nav-link" th:classappend="${active == 'teams'} ? ' active'" href="/admin/teams">
            <i class="bi bi-people nav-icon"></i> Teams
        </a>
        <a class="nav-link" th:classappend="${active == 'referees'} ? ' active'" href="/admin/referees">
            <i class="bi bi-person-badge nav-icon"></i> Referees
        </a>
        <a class="nav-link" th:classappend="${active == 'fixtures'} ? ' active'" href="/admin/fixtures">
            <i class="bi bi-calendar3 nav-icon"></i> Fixtures
        </a>
        <a class="nav-link" th:classappend="${active == 'results'} ? ' active'" href="/admin/reports">
            <i class="bi bi-clipboard-check nav-icon"></i> Results
        </a>
        <a class="nav-link" th:classappend="${active == 'season'} ? ' active'" href="/admin/reports/season">
            <i class="bi bi-bar-chart nav-icon"></i> Season Reports
        </a>
        <a class="nav-link" th:classappend="${active == 'punishments'} ? ' active'" href="/admin/reports/punishments">
            <i class="bi bi-exclamation-octagon nav-icon"></i> Punishments
        </a>
        <a class="nav-link" th:classappend="${active == 'transfers'} ? ' active'" href="/admin/reports/transfers">
            <i class="bi bi-arrow-left-right nav-icon"></i> Transfers
        </a>
    </nav>
</aside>

<header th:fragment="admin-topbar" class="app-topbar">
    <div class="text-muted small">Rwanda Football Federation</div>
    <div class="d-flex align-items-center gap-3">
        <div class="user-chip">
            <img th:src="@{/img/ferwafa-logo.png}" alt="">
            <span>Admin</span>
        </div>
        <button class="btn btn-outline-secondary btn-sm" onclick="logout()">Logout</button>
    </div>
</header>

<aside th:fragment="team-sidebar(active)" class="app-sidebar">
    <a class="sidebar-brand brand-lockup" href="/team/dashboard">
        <img th:src="@{/img/ferwafa-logo.png}" alt="FERWAFA">
        <span>
            <span class="brand-name">FERWAFA</span>
            <span class="brand-sub">Team Portal</span>
        </span>
    </a>
    <nav class="nav flex-column">
        <a class="nav-link" th:classappend="${active == 'home'} ? ' active'" href="/team/dashboard">
            <i class="bi bi-house nav-icon"></i> Home
        </a>
        <a class="nav-link" th:classappend="${active == 'members'} ? ' active'" href="/team/members">
            <i class="bi bi-people nav-icon"></i> Members
        </a>
        <a class="nav-link" th:classappend="${active == 'lineup'} ? ' active'" href="/team/lineup">
            <i class="bi bi-list-check nav-icon"></i> Lineup
        </a>
        <a class="nav-link" th:classappend="${active == 'transfers'} ? ' active'" href="/team/transfers">
            <i class="bi bi-arrow-left-right nav-icon"></i> Transfer Requests
        </a>
        <a class="nav-link" href="/public/standings" target="_blank">
            <i class="bi bi-trophy nav-icon"></i> Standings
        </a>
    </nav>
</aside>

<header th:fragment="team-topbar" class="app-topbar">
    <div class="user-chip">
        <img id="teamTopLogo" th:src="@{/img/ferwafa-logo.png}" alt="" class="team-crest sm">
        <span id="teamTopName">Team</span>
    </div>
    <button class="btn btn-outline-secondary btn-sm" onclick="logout()">Logout</button>
</header>

<!-- Legacy navbar fragments kept for any remaining pages -->
<nav th:fragment="admin-nav" class="d-none"></nav>
<nav th:fragment="team-nav" class="d-none"></nav>

<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/api.js}"></script>
    <script th:src="@{/js/auth.js}"></script>
</div>
</body>
</html>
