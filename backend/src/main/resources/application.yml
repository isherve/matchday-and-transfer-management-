spring:
  application:
    name: ferwafa-system
  datasource:
    # Local docker-compose / Railway MySQL plugin env vars (MYSQLHOST, MYSQLPORT, …)
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://${DB_HOST:${MYSQLHOST:localhost}}:${DB_PORT:${MYSQLPORT:3306}}/${MYSQL_DATABASE:${MYSQLDATABASE:ferwafa}}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:${MYSQL_USER:${MYSQLUSER:ferwafa}}}
    password: ${SPRING_DATASOURCE_PASSWORD:${MYSQL_PASSWORD:${MYSQLPASSWORD:ferwafa123}}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

server:
  # Railway / cloud hosts inject PORT
  port: ${PORT:${SERVER_PORT:8080}}
  servlet:
    context-path: /

ferwafa:
  jwt:
    secret: ${JWT_SECRET:ferwafa-jwt-secret-change-in-production-min-256-bits-long-key-here}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:8080,http://localhost:3000,http://10.0.2.2:8080}
  discipline:
    yellow-card-threshold: ${YELLOW_CARD_THRESHOLD:2}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui

logging:
  level:
    com.ferwafa: INFO
    org.springframework.security: WARN
