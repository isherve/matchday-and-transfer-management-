version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ferwafa-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ferwafa}
      MYSQL_USER: ${MYSQL_USER:-ferwafa}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ferwafa123}
    ports:
      - "3306:3306"
    volumes:
      - ferwafa_mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ferwafa_mysql_data:
